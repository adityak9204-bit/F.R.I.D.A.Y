<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Friday Assistant</title>
    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
      }
      .wrap { max-width: 920px; margin: 2rem auto; padding: 0 1rem; }
      .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 1rem; }
      h1 { margin: 0 0 0.5rem; }
      p { color: #94a3b8; }
      textarea {
        width: 100%; min-height: 110px; background: #020617; color: #e2e8f0;
        border: 1px solid #334155; border-radius: 8px; padding: 0.75rem;
      }
      button {
        margin-top: 0.75rem; margin-right: 0.5rem; border: none; border-radius: 8px;
        padding: 0.6rem 0.9rem; background: #0ea5e9; color: white; cursor: pointer;
      }
      .danger { background: #ef4444; }
      #log {
        white-space: pre-wrap; background: #020617; border: 1px solid #334155;
        border-radius: 8px; padding: 0.8rem; margin-top: 1rem;
      }
      .muted { color: #94a3b8; font-size: 0.95rem; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Friday (Voice + Live Web)</h1>
        <p>Continuous active listening with session memory and live web-backed answers.</p>
        <textarea id="prompt" placeholder="Type or use Start Listening…"></textarea>
        <br />
        <button id="askBtn">Ask</button>
        <button id="listenBtn">Start Listening</button>
        <button id="stopBtn">Stop Listening</button>
        <button id="resetBtn" class="danger">Reset Memory</button>
        <div class="muted" id="status">Status: idle</div>
        <div class="muted" id="session"></div>
        <div id="log"></div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
